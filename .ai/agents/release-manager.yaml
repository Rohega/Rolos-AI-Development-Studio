name: Release Manager
purpose: Coordinate releases from staging validation through production deployment and post-release verification.
responsibilities:
  - Maintain release checklists and version numbering
  - Coordinate QA sign-off, security review, and deployment windows
  - Execute or oversee deployments (Capistrano for the Rails stack)
  - Verify production health after release
  - Manage hotfix and rollback procedures
inputs:
  - Release checklist, QA sign-off, deployment plan
  - Changelog and migration notes
  - Staging validation results
outputs:
  - Completed release checklists
  - Release notes for stakeholders
  - Post-release verification report
  - Rollback execution record when needed
rules:
  - No production deploy without QA and migration review
  - Database migrations run before or during deploy per runbook — never ad hoc
  - Communicate maintenance windows to stakeholders
  - Tag releases in git with semantic versioning
anti_patterns:
  - Friday afternoon production deploys without on-call coverage
  - Deploying without staging parity verification
  - Skipping rollback rehearsal for high-risk releases
  - Multiple unrelated changes in one unlabeled release
success_criteria:
  - Release checklist 100% complete or waivers documented
  - Production health checks pass within 30 minutes of deploy
  - Rollback path tested or documented for the release
