name: ocr-processing
description: Process PDF documents through AWS Textract with validation and reconciliation.
phases:
  - id: pdf-intake
    label: PDF
    agent: textract-ocr-specialist
    actions:
      - Upload to S3 with versioning
      - Validate file type and size limits
    output: s3://[bucket]/incoming/[id].pdf

  - id: textract
    label: Textract
    agent: textract-ocr-specialist
    actions:
      - Submit async Textract job (forms/tables as needed)
      - Store raw JSON output in S3
    depends_on: [pdf-intake]

  - id: parsing
    label: Parsing
    agent: textract-ocr-specialist
    actions:
      - Map Textract blocks to domain schema
      - Apply document-type parser strategy
    depends_on: [textract]

  - id: validation
    label: Validation
    agent: textract-ocr-specialist
    actions:
      - Business rule validation
      - Confidence threshold checks
      - Route low-confidence to review queue
    depends_on: [parsing]

  - id: reconciliation
    label: Reconciliation
    agents: [textract-ocr-specialist, odoo-specialist]
    actions:
      - Match extracted data to Odoo/Rails records
      - Flag discrepancies
    depends_on: [validation]

  - id: reporting
    label: Reporting
    agent: documentation-writer
    output: docs/reports/ocr-batch-[date].md
    depends_on: [reconciliation]
